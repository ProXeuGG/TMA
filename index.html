<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профкрафт Админ-Панель</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #181818);
            color: var(--tg-theme-text-color, #ffffff);
            margin: 0; padding: 15px;
        }
        .screen { display: none; text-align: center; margin-top: 50px; }
        .screen.active { display: block; margin-top: 0; }
        .error-card { background: #ff4d4d; color: white; padding: 15px; border-radius: 10px; margin-top: 20px; }
        .card {
            background: var(--tg-theme-secondary-bg-color, #242424);
            border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h3 { margin-top: 0; color: var(--tg-theme-link-color, #64b5f6); }
        .btn {
            background: var(--tg-theme-button-color, #248bcf);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none; padding: 10px 15px; border-radius: 8px;
            font-weight: bold; cursor: pointer; margin: 5px; width: calc(50% - 14px);
            display: inline-block; box-sizing: border-box;
        }
        .btn-danger { background: #d32f2f; color: white; }
        .btn-full { width: 100%; margin: 5px 0; }
        input {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444;
            background: #333; color: white; box-sizing: border-box; font-size: 16px;
        }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: ЗАГРУЗКА И АВТОРИЗАЦИЯ -->
    <div id="auth-screen" class="screen active">
        <h2>Проверка прав доступа...</h2>
        <div id="auth-error" style="display: none;" class="error-card"></div>
    </div>

    <!-- ЭКРАН 2: РАБОЧАЯ ПАНЕЛЬ УПРАВЛЕНИЯ -->
    <div id="admin-screen" class="screen">
        <h2 style="margin-bottom: 5px;">Профкрафт Панель</h2>
        <p id="admin-welcome" style="margin-top:0; opacity: 0.7;"></p>

        <!-- Быстрые действия с игроком -->
        <div class="card">
            <h3>Управление игроком</h3>
            <input type="text" id="target-player" placeholder="Введите ник игрока">
            <div style="margin-top: 10px;">
                <button class="btn" onclick="sendAction('gm1')">🔮 Креатив</button>
                <button class="btn" onclick="sendAction('gm0')">⚔️ Выживание</button>
                <button class="btn" onclick="sendAction('op')">👑 Выдать OP</button>
                <button class="btn" onclick="sendAction('deop')">🚷 Снять OP</button>
                <button class="btn btn-danger btn-full" onclick="sendAction('kick')">💥 Кикнуть с сервера</button>
            </div>
        </div>

        <!-- Консоль -->
        <div class="card">
            <h3>Выполнить команду в консоль</h3>
            <input type="text" id="console-cmd" placeholder="Например: say Всем привет!">
            <button class="btn btn-full" style="margin-top:10px;" onclick="sendConsoleCommand()">💻 Отправить в консоль</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем приложение на весь экран

        // Запуск проверки авторизации при открытии приложения
        async function checkAuth() {
            try {
                const response = await fetch('/api/auth-check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData: tg.initData })
                });
                const data = await response.json();

                if (data.authorized) {
                    document.getElementById('auth-screen').classList.remove('active');
                    document.getElementById('admin-screen').classList.add('active');
                    document.getElementById('admin-welcome').innerText = `Администратор: ${data.user.first_name || 'Admin'}`;
                } else {
                    showError(data.error || 'Доступ заблокирован.');
                }
            } catch (e) {
                showError('Ошибка связи с бэкендом Vercel.');
            }
        }

        function showError(msg) {
            const errDiv = document.getElementById('auth-error');
            errDiv.innerText = msg;
            errDiv.style.display = 'block';
            document.querySelector('#auth-screen h2').innerText = 'Вход заблокирован';
        }

        // Отправка структурированных экшенов (gm, op, kick)
        async function sendAction(type) {
            const player = document.getElementById('target-player').value.trim();
            if (!player) return alert('Сначала введите ник игрока!');
            
            tg.HapticFeedback.impactOccurred('medium'); // Виброотклик телефона

            const response = await fetch('/api/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    initData: tg.initData,
                    action: `act:${type}:${player}`
                })
            });
            if(response.ok) tg.showAlert(`Команда отправлена для ${player}!`);
        }

        // Отправка произвольной консольной команды
        async function sendConsoleCommand() {
            const cmd = document.getElementById('console-cmd').value.trim();
            if (!cmd) return alert('Введите команду!');

            tg.HapticFeedback.impactOccurred('heavy');

            const response = await fetch('/api/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    initData: tg.initData,
                    action: `run_c_cmd_raw:${cmd}` // Передаем кастомный текст напрямую
                })
            });
            if(response.ok) {
                tg.showAlert(`Консоль выполнит: /${cmd}`);
                document.getElementById('console-cmd').value = '';
            }
        }

        // Небольшой апдейт для плагина, чтобы он умел переваривать сырые команды из консоли мини-аппа
        checkAuth();
    </script>
</body>
</html>
