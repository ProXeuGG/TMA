<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TelegramSRVLite Admin Panel</title>
    <!-- Подключаем Telegram Web App API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #181818;
            --container-bg: #242424;
            --text-color: #ffffff;
            --accent-color: #2481cc;
            --danger-color: #e53935;
            --success-color: #4caf50;
            --border-color: #383838;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        h2, h3 { margin-top: 0; color: var(--accent-color); }

        .config-box {
            background: var(--container-bg);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
        }

        .input-group label { font-size: 12px; margin-bottom: 5px; color: #aaa; }

        input, select, textarea {
            background: #121212;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
        }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        button.danger { background: var(--danger-color); }

        /* Вкладки */
        .tabs {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 5px;
        }

        .tab-btn {
            background: var(--container-bg);
            color: #aaa;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: var(--accent-color);
            color: white;
        }

        .tab-content {
            display: none;
            background: var(--container-bg);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .tab-content.active { display: block; }

        /* Стили для списков и таблиц */
        .grid-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .stat-card {
            background: #121212;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-card div { font-size: 20px; font-weight: bold; margin-top: 5px; }

        .player-item, .quote-item {
            background: #121212;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .player-controls {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .leaderboard-table th, .leaderboard-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

    <!-- Настройки подключения (Удобно для тестов, потом можно захардкодить) -->
    <div class="config-box">
        <h3>Подключение к серверу</h3>
        <div class="input-group">
            <label>API URL сервера</label>
            <input type="text" id="serverUrl" value="http://localhost:8000">
        </div>
        <div class="input-group">
            <label>Пароль (admin-password из config.yml)</label>
            <input type="password" id="adminPassword" value="мой_пароль_из_конфига">
        </div>
    </div>

    <!-- Навигация по вкладкам -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tab-stats')">Статус</button>
        <button class="tab-btn" onclick="switchTab('tab-players'); loadPlayers();">Игроки</button>
        <button class="tab-btn" onclick="switchTab('tab-announcement'); loadAnnouncement();">Плашка</button>
        <button class="tab-btn" onclick="switchTab('tab-quotes'); loadQuotes();">Цитаты</button>
        <button class="tab-btn" onclick="switchTab('tab-leaderboard'); loadLeaderboard();">Доска почета</button>
    </div>

    <!-- Вкладка: Статус -->
    <div id="tab-stats" class="tab-content active">
        <h2>Мониторинг</h2>
        <div class="grid-stats">
            <div class="stat-card">TPS <div id="stat-tps">-</div></div>
            <div class="stat-card">Онлайн <div id="stat-online">-</div></div>
            <div class="stat-card">ОЗУ (Использовано) <div id="stat-ram">-</div></div>
            <div class="stat-card">Вайтлист <div id="stat-wl">-</div></div>
        </div>
        <button style="margin-top: 15px; width: 100%;" onclick="loadStats()">Обновить данные</button>
    </div>

    <!-- Вкладка: Игроки -->
    <div id="tab-players" class="tab-content">
        <h2>Игроки Онлайн</h2>
        <div id="players-list">Загрузка...</div>
    </div>

    <!-- Вкладка: Плашка -->
    <div id="tab-announcement" class="tab-content">
        <h2>Объявление в ТГ плашке</h2>
        <div class="input-group">
            <label>Текущий текст объявления</label>
            <textarea id="announcementText" rows="4" placeholder="Введите текст объявления..."></textarea>
        </div>
        <button onclick="saveAnnouncement()" style="width: 100%;">Обновить плашку</button>
        <button onclick="clearAnnouncement()" class="danger" style="width: 100%; margin-top: 5px;">Стереть объявление</button>
    </div>

    <!-- Вкладка: Цитаты -->
    <div id="tab-quotes" class="tab-content">
        <h2>Управление Цитатами</h2>
        <div style="margin-bottom: 15px; padding: 10px; background: #121212; border-radius: 6px;">
            <h4>Добавить новую</h4>
            <div class="input-group">
                <input type="text" id="quoteAuthor" placeholder="Автор (Ник)">
            </div>
            <div class="input-group">
                <input type="text" id="quoteText" placeholder="Текст цитаты">
            </div>
            <button onclick="addQuote()">Добавить</button>
        </div>
        <div id="quotes-list">Загрузка...</div>
    </div>

    <!-- Вкладка: Лидерборд -->
    <div id="tab-leaderboard" class="tab-content">
        <h2>Доска почёта</h2>
        <table class="leaderboard-table">
            <thead>
                <tr><th>Метрика</th><th>Игрок</th><th>Значение</th></tr>
            </thead>
            <tbody id="leaderboard-data">
                <!-- Сюда вставятся топы из yml -->
            </tbody>
        </table>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Расширяем на весь экран телефона

        // Переключение вкладок
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // Общая функция для отправки запросов к Java API
        async function sendRequest(endpoint, method = 'GET', data = null) {
            const baseUrl = document.getElementById('serverUrl').value;
            const password = document.getElementById('adminPassword').value;

            const options = {
                method: method,
                headers: {
                    'Authorization': `Bearer ${password}`,
                    'Content-Type': 'application/json'
                }
            };

            // Если передаем данные, превращаем JavaScript-объект в JSON строку
            if (data && (method === 'POST')) {
                options.body = JSON.stringify(data);
            }

            try {
                const response = await fetch(`${baseUrl}${endpoint}`, options);
                if (response.status === 401) {
                    alert('Ошибка: Неверный пароль авторизации!');
                    return null;
                }
                return await response.json();
            } catch (error) {
                console.error('Ошибка запроса:', error);
                alert('Не удалось связаться с сервером Minecraft.');
                return null;
            }
        }

        // 1. ЗАГРУЗКА СТАТИСТИКИ
        async function loadStats() {
            const data = await sendRequest('/api/stats');
            if (data) {
                document.getElementById('stat-tps').innerText = data.tps;
                document.getElementById('stat-online').innerText = `${data.online}/${data.maxPlayers}`;
                document.getElementById('stat-ram').innerText = `${data.usedMemory} MB / ${data.totalMemory} MB`;
                document.getElementById('stat-wl').innerText = data.whitelist ? "Включен" : "Выключен";
            }
        }
        // Загружаем статистику сразу при старте страницы
        loadStats();

        // 2. ЗАГРУЗКА ИГРОКОВ И УПРАВЛЕНИЕ ИМИ
        async function loadPlayers() {
            const listEl = document.getElementById('players-list');
            listEl.innerHTML = "Загрузка...";
            const players = await sendRequest('/api/players');
            
            if (!players || players.length === 0) {
                listEl.innerHTML = "Нет игроков онлайн.";
                return;
            }

            listEl.innerHTML = "";
            players.forEach(p => {
                const item = document.createElement('div');
                item.className = 'player-item';
                item.innerHTML = `
                    <strong>${p.name}</strong>
                    <span style="font-size:12px; color:#aaa;">Мир: ${p.world} | Режим: ${p.gamemode} | ХП: ${p.health}❤️</span>
                    <div class="player-controls">
                        <button onclick="setGamemode('${p.name}', 'creative')">GM 1</button>
                        <button onclick="setGamemode('${p.name}', 'survival')">GM 0</button>
                        <button onclick="teleportToCoords('${p.name}')">ТП на 0 64 0</button>
                    </div>
                `;
                listEl.appendChild(item);
            });
        }

        async function setGamemode(playerName, gm) {
            // Пример отправки JSON POST запроса
            await sendRequest('/api/player/gamemode', 'POST', { player: playerName, gamemode: gm });
            alert(`Режим игрока ${playerName} изменен на ${gm}`);
            loadPlayers();
        }

        async function teleportToCoords(playerName) {
            // Передаем координаты в формате JSON
            await sendRequest('/api/player/teleport', 'POST', { player: playerName, x: 0, y: 64, z: 0 });
            alert(`Игрок ${playerName} телепортирован на спавн (0 64 0)`);
        }

        // 3. УПРАВЛЕНИЕ ОБЪЯВЛЕНИЕМ В ПЛАШКЕ
        async function loadAnnouncement() {
            const data = await sendRequest('/api/announcement');
            if (data) {
                document.getElementById('announcementText').value = data.announcement;
            }
        }

        async function saveAnnouncement() {
            const text = document.getElementById('announcementText').value;
            await sendRequest('/api/announcement', 'POST', { text: text });
            alert('Объявление обновлено и отправлено в Telegram!');
        }

        async function clearAnnouncement() {
            await sendRequest('/api/announcement', 'POST', { text: "" });
            document.getElementById('announcementText').value = "";
            alert('Объявление удалено с плашки!');
        }

        // 4. УПРАВЛЕНИЕ ЦИТАТАМИ
        async function loadQuotes() {
            const listEl = document.getElementById('quotes-list');
            listEl.innerHTML = "Загрузка...";
            const quotes = await sendRequest('/api/quotes');
            
            if (!quotes || quotes.length === 0) {
                listEl.innerHTML = "Цитат пока нет.";
                return;
            }

            listEl.innerHTML = "";
            quotes.forEach((q, index) => {
                const item = document.createElement('div');
                item.className = 'quote-item';
                item.innerHTML = `
                    <div>"<em>${q.text}</em>" — <strong>${q.author}</strong></div>
                    <button class="danger" style="align-self: flex-start; padding: 5px 10px; font-size:12px;" onclick="deleteQuote(${index})">Удалить</button>
                `;
                listEl.appendChild(item);
            });
        }

        async function addQuote() {
            const author = document.getElementById('quoteAuthor').value;
            const text = document.getElementById('quoteText').value;
            if(!author || !text) return alert("Заполните поля!");

            await sendRequest('/api/quotes', 'POST', { action: "add", author: author, text: text });
            document.getElementById('quoteAuthor').value = "";
            document.getElementById('quoteText').value = "";
            loadQuotes();
        }

        async function deleteQuote(index) {
            if(!confirm("Удалить эту цитату?")) return;
            await sendRequest('/api/quotes', 'POST', { action: "delete", index: index });
            loadQuotes();
        }

        // 5. ЗАГРУЗКА ЛИДЕРБОРДА
        async function loadLeaderboard() {
            const tbody = document.getElementById('leaderboard-data');
            tbody.innerHTML = "<tr><td colspan='3'>Загрузка...</td></tr>";
            const data = await sendRequest('/api/leaderboard');
            
            if (!data) return;
            tbody.innerHTML = "";

            // Отрисовываем стандартную статистику
            if (data.stats) {
                for (let metric in data.stats) {
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${metric} (Топ)</strong></td>
                            <td>${data.stats[metric].player || 'Нет'}</td>
                            <td>${data.stats[metric].value}</td>
                        </tr>`;
                }
            }

            // Отрисовываем кастомную статистику
            if (data.custom) {
                for (let metric in data.custom) {
                    tbody.innerHTML += `
                        <tr>
                            <td>${metric} (Кастом)</td>
                            <td>${data.custom[metric].player || 'Нет'}</td>
                            <td>${data.custom[metric].value}</td>
                        </tr>`;
                }
            }
        }
    </script>
</body>
</html>
