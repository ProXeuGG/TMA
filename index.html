<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Управления Сервером</title>
    <!-- Подключаем официальный скрипт Телеграма для Mini App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Настройка фона и шрифтов под тему Телеграма */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--tg-theme-hint-color, #aaaaaa);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Контейнер для кнопок, имитирующий сетку (Grid) инлайн-клавиатуры */
        .keyboard-container {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Две кнопки в ряд, как в ботах */
            gap: 8px; /* Расстояние между кнопками */
            width: 100%;
            max-width: 400px;
        }

        /* Кнопка на всю ширину (если нужно сделать один важный ряд) */
        .full-width {
            grid-column: span 2;
        }

        /* Стилизация кнопок точь-в-точь как Telegram Inline Keyboards */
        .tg-button {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px; /* Закругление как у стандартных кнопок */
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s ease;
            text-align: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        /* Эффект при нажатии */
        .tg-button:active {
            opacity: 0.8;
        }

        /* Кнопки предупреждения (например, стоп или кик) */
        .danger {
            background-color: #e53935;
        }
    </style>
</head>
<body>

    <h2 id="server-status">Загрузка статуса...</h2>

    <!-- Сетка кнопок (наша Mini Keyboard) -->
    <div class="keyboard-container">
        
        <button class="tg-button full-width" onclick="sendAction('status')">🔄 Обновить статус</button>
        
        <button class="tg-button" onclick="sendAction('whitelist_on')">🔐 Вкл. Вайтлист</button>
        <button class="tg-button" onclick="sendAction('whitelist_off')">🔓 Выкл. Вайтлист</button>
        
        <button class="tg-button" onclick="sendAction('say_hello')">📢 Объявление в чат</button>
        <button class="tg-button danger" onclick="sendAction('kick_all')">🛑 Кикнуть всех</button>
        
        <button class="tg-button danger full-width" onclick="sendAction('stop_server')">⚠️ Выключить сервер</button>

    </div>

    <script>
        // Инициализируем Telegram WebApp API
        const tg = window.Telegram.WebApp;
        tg.ready(); // Сообщаем ТГ, что приложение готово
        tg.expand(); // Разворачиваем на максимум для удобства

        // Функция отправки команды на наш бэкенд Vercel
        async function sendAction(actionCommand) {
            // Виброотклик при нажатии на кнопку (как в Телеграме!)
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }

            // Собираем данные авторизации Телеграма и саму команду
            const payload = {
                initData: tg.initData, // Передаем строку инициализации для проверки прав
                actionData: actionCommand // Передаем саму команду (например, 'kick_all')
            };

            try {
                // Делаем запрос к нашему эндпоинту action.js, который мы создали на прошлом шаге
                const response = await fetch('/api/admin/action', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.status === 'queued') {
                    // Красивое всплывающее уведомление внутри Телеграма
                    tg.showAlert(`Команда "${actionCommand}" успешно отправлена на сервер!`);
                } else {
                    tg.showPopup({ title: 'Ошибка', message: 'Не удалось поставить команду в очередь.' });
                }

            } catch (error) {
                tg.showPopup({ title: 'Ошибка сети', message: error.message });
            }
        }

        // В будущем здесь будет код, который берет данные из Redis и обновляет статус h2
        document.getElementById('server-status').innerText = "K-TECH ПАНЕЛЬ УПРАВЛЕНИЯ";
    </script>
</body>
</html>
