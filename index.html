<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProfCraft Premium Admin Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #09090b);
            color: var(--tg-theme-text-color, #f4f4f5);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tg-btn-active { border-color: #818cf8; color: #818cf8; background: rgba(129, 140, 248, 0.1); }
    </style>
</head>
<body class="p-4 font-sans antialiased selection:bg-indigo-500 selection:text-white pb-24">

    <!-- Верхушка панели -->
    <div class="flex items-center justify-between mb-5 border-b border-zinc-800/80 pb-4">
        <div>
            <h1 class="text-lg font-bold text-white tracking-wide">ProfCraft Panel</h1>
            <p id="server-v" class="text-[10px] text-zinc-500 font-mono">Версия: загрузка...</p>
        </div>
        <div class="flex items-center gap-2">
            <span id="tps-badge" class="px-2.5 py-1 rounded-lg text-xs font-mono font-bold bg-emerald-950/50 text-emerald-400 border border-emerald-800/50">TPS: --</span>
        </div>
    </div>

    <!-- ТАБЫ (ВКЛАДКИ) -->
    <main>
        <!-- Вкладка 1: Главная (Метрики) -->
        <div id="tab-dash" class="tab-content active space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-zinc-900/40 border border-zinc-800 p-3 rounded-xl backdrop-blur-sm">
                    <p class="text-[11px] text-zinc-500 font-medium uppercase tracking-wider">Игроки онлайн</p>
                    <p id="stat-online" class="text-xl font-bold mt-1 text-zinc-100">-- / --</p>
                </div>
                <div class="bg-zinc-900/40 border border-zinc-800 p-3 rounded-xl backdrop-blur-sm">
                    <p class="text-[11px] text-zinc-500 font-medium uppercase tracking-wider">ОЗУ Сервера</p>
                    <p id="stat-ram" class="text-xl font-bold mt-1 text-zinc-100">-- МБ</p>
                </div>
            </div>

            <!-- Быстрое объявление (Плашка / Чат) -->
            <div class="bg-zinc-900/30 border border-zinc-800/80 p-4 rounded-xl">
                <h3 class="text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-2">📢 Объявление на весь сервер</h3>
                <div class="flex gap-2">
                    <input type="text" id="bc-input" placeholder="Текст объявления..." 
                           class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500 text-zinc-300">
                    <button onclick="sendBroadcast()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition active:scale-95">Оповестить</button>
                </div>
            </div>
        </div>

        <!-- Вкладка 2: Игроки (ПРОКАЧАННАЯ) -->
        <div id="tab-players" class="tab-content space-y-3">
            <h2 class="text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1">👥 Управление игроками (Нажми для настроек)</h2>
            <div id="players-list" class="space-y-2.5">
                <p class="text-xs text-zinc-500 italic">Загрузка игроков...</p>
            </div>
        </div>

        <!-- Вкладка 4: Доска почета (ПРОКАЧАННАЯ) -->
        <div id="tab-leader" class="tab-content space-y-4">
            <h2 class="text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1">🏆 Доска почёта</h2>
            <div class="bg-zinc-900/30 border border-zinc-800/80 rounded-xl overflow-hidden">
                <table class="w-full text-left border-collapse text-xs">
                    <thead>
                        <tr class="bg-zinc-900/60 border-b border-zinc-800 text-zinc-400 font-medium">
                            <th class="p-3">Номинация</th>
                            <th class="p-3">Лидер</th>
                            <th class="p-3 text-right">Результат</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-data" class="divide-y divide-zinc-800/50 text-zinc-300">
                        <tr><td colspan="3" class="p-4 text-center text-zinc-500 italic">Загрузка топов...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Вкладка 3: Консоль и Система -->
        <div id="tab-sys" class="tab-content space-y-4">
            <!-- Быстрые команды -->
            <div class="bg-zinc-900/30 border border-zinc-800/80 p-4 rounded-xl">
                <h3 class="text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-3">🛠️ Быстрые действия</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="quickAction('whitelist on')" class="bg-zinc-900 border border-zinc-800 text-zinc-300 py-2 rounded-lg text-xs font-medium hover:bg-zinc-800 transition">Вкл Whitelist</button>
                    <button onclick="quickAction('whitelist off')" class="bg-zinc-900 border border-zinc-800 text-zinc-300 py-2 rounded-lg text-xs font-medium hover:bg-zinc-800 transition">Выкл Whitelist</button>
                    <button onclick="quickAction('save-all')" class="bg-zinc-900 border border-zinc-800 text-zinc-300 py-2 rounded-lg text-xs font-medium hover:bg-zinc-800 transition">Сохранить мир</button>
                    <button onclick="askRestart()" class="bg-red-950/30 border border-red-900/50 text-red-400 py-2 rounded-lg text-xs font-medium hover:bg-red-900/30 transition">Рестарт сервера</button>
                </div>
            </div>

            <!-- Полноценный терминал -->
            <div class="bg-zinc-900/30 border border-zinc-800/80 p-4 rounded-xl">
                <h3 class="text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-2">💻 Прямая Консоль</h3>
                <div class="flex gap-2">
                    <input type="text" id="cmd-input" placeholder="Команда без /" 
                           class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500 font-mono text-zinc-300">
                    <button onclick="sendConsoleCommand()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition active:scale-95">Выполнить</button>
                </div>
            </div>
        </div>
    </main>

    <!-- НИЖНЕЕ МЕНЮ НАВИГАЦИИ (ФУТЕР) -->
    <div class="fixed bottom-0 left-0 right-0 bg-zinc-950 border-t border-zinc-800/80 p-2 flex justify-around items-center backdrop-blur-md">
        <button onclick="switchTab('dash', this)" class="flex flex-col items-center gap-1 text-zinc-500 px-4 py-1.5 rounded-xl transition text-[11px] font-medium tg-btn-active">
            <span>📊</span>Главная
        </button>
        <button onclick="switchTab('players', this)" class="flex flex-col items-center gap-1 text-zinc-500 px-4 py-1.5 rounded-xl transition text-[11px] font-medium">
            <span>👥</span>Игроки
        </button>
        <button onclick="switchTab('leader', this)" class="flex flex-col items-center gap-1 text-zinc-500 px-4 py-1.5 rounded-xl transition text-[11px] font-medium">
            <span>🏆</span>Топ
        </button>
        <button onclick="switchTab('sys', this)" class="flex flex-col items-center gap-1 text-zinc-500 px-4 py-1.5 rounded-xl transition text-[11px] font-medium">
            <span>⚙️</span>Система
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const API_URL = urlParams.get('api');
        const TOKEN = urlParams.get('token');

        axios.defaults.headers.common['Authorization'] = `Bearer ${TOKEN}`;

        // Словарь для перевода английских метрик в крутые русские названия
        const metricTranslations = {
            "blocks_broken": "⛏️ Прораб года (Блоков сломано)",
            "player_kills": "⚔️ Охотник за головами (Убито игроков)",
            "mob_kills": "🦁 Истребитель фауны (Убито мобов)",
            "deaths": "💀 Постоянный гость спавна (Смертей)",
            "time_played": "⏱️ Задрот сервера (Время в игре)",
            "jumps": "🦘 Прыгучий кузнечик (Прыжков)",
            "damage_dealt": "💥 Берсерк (Нанесено урона)",
            "fish_caught": "🎣 Главный рыбак (Поймано рыбы)"
        };

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.fixed button').forEach(el => el.classList.remove('all', 'tg-btn-active'));
            
            document.getElementById(`tab-${tabId}`).classList.add('active');
            btn.classList.add('tg-btn-active');
            tg.HapticFeedback.impactOccurred('light');

            if(tabId === 'leader') loadLeaderboard();
        }

        // Переключалка видимости детальной инфы игрока
        function togglePlayerCard(name) {
            const card = document.getElementById(`details-${name}`);
            if(card.classList.contains('hidden')) {
                card.classList.remove('hidden');
            } else {
                card.classList.add('hidden');
            }
            tg.HapticFeedback.impactOccurred('light');
        }

        async function loadData() {
            if(!API_URL || !TOKEN) return;
            try {
                // Метрики сервера
                const statsRes = await axios.get(`${API_URL}/api/stats`);
                const tps = statsRes.data.tps;
                const tpsBadge = document.getElementById('tps-badge');
                tpsBadge.innerText = `TPS: ${tps}`;
                
                if(tps < 15) {
                    tpsBadge.className = "px-2.5 py-1 rounded-lg text-xs font-mono font-bold bg-red-950/50 text-red-400 border border-red-800/50";
                } else {
                    tpsBadge.className = "px-2.5 py-1 rounded-lg text-xs font-mono font-bold bg-emerald-950/50 text-emerald-400 border border-emerald-800/50";
                }

                document.getElementById('server-v').innerText = `Ядро: ${statsRes.data.version} | WL: ${statsRes.data.whitelist ? 'Вкл' : 'Выкл'}`;
                document.getElementById('stat-online').innerText = `${statsRes.data.online} / ${statsRes.data.maxPlayers}`;
                document.getElementById('stat-ram').innerText = `${statsRes.data.usedMemory} / ${statsRes.data.totalMemory}`;

                // Игроки
                const playersRes = await axios.get(`${API_URL}/api/players`);
                const listDiv = document.getElementById('players-list');
                
                // Сохраняем ID открытых карточек, чтобы они не закрывались при автообновлении раз в 4 секунды
                const openedCards = [];
                document.querySelectorAll('[id^="details-"]').forEach(el => {
                    if(!el.classList.contains('hidden')) openedCards.push(el.id);
                });

                listDiv.innerHTML = '';

                if(playersRes.data.length === 0) {
                    listDiv.innerHTML = '<div class="text-center py-8 text-zinc-600 text-xs italic">На сервере сейчас никого нет</div>';
                } else {
                    playersRes.data.forEach(p => {
                        const isHidden = openedCards.includes(`details-${p.name}`) ? '' : 'hidden';
                        
                        // Рендерим кастомные статы из кэша (если они пришли в объекте p.stats)
                        let statsHtml = '';
                        if(p.stats) {
                            statsHtml += `<div class="bg-zinc-950/60 p-2 rounded-lg border border-zinc-800/50 mt-2"><p class="text-[10px] text-zinc-500 uppercase font-bold mb-1">📊 Статистика из кэша:</p><div class="grid grid-cols-2 gap-x-4 gap-y-1 text-[11px]">`;
                            for(let sKey in p.stats) {
                                const sName = metricTranslations[sKey] || sKey;
                                statsHtml += `<div class="text-zinc-400 flex justify-between"><span>${sName}:</span> <span class="font-mono text-indigo-400">${p.stats[sKey]}</span></div>`;
                            }
                            statsHtml += `</div></div>`;
                        }

                        listDiv.innerHTML += `
                            <div class="bg-zinc-900/40 border border-zinc-800/60 rounded-xl overflow-hidden">
                                <!-- Шапка карточки (кликабельная) -->
                                <div onclick="togglePlayerCard('${p.name}')" class="p-3 flex items-center justify-between hover:bg-zinc-800/20 transition cursor-pointer">
                                    <div class="flex items-center gap-2.5">
                                        <img src="https://crafatar.com/avatars/${p.uuid}?size=32&overlay" class="w-8 h-8 rounded-md bg-zinc-800 border border-zinc-700/50">
                                        <div>
                                            <p class="font-bold text-sm text-zinc-100">${p.name}</p>
                                            <p class="text-[10px] text-zinc-500 font-mono">${p.world} | MS: ${p.ping}</p>
                                        </div>
                                    </div>
                                    <div class="text-right">
                                        <span class="text-xs font-semibold text-rose-400">❤️ ${p.health}</span>
                                        <p class="text-[9px] text-zinc-500 font-mono">Нажми для опций</p>
                                    </div>
                                </div>

                                <!-- Внутрянка: Полноценное доп. меню -->
                                <div id="details-${p.name}" class="${isHidden} p-3 border-t border-zinc-800/50 bg-zinc-950/30 space-y-3">
                                    
                                    <!-- Полная инфа -->
                                    <div class="grid grid-cols-2 gap-2 text-xs bg-zinc-900/60 p-2.5 rounded-lg border border-zinc-800/40 font-mono">
                                        <p class="text-zinc-400">Координаты: <span class="text-zinc-200 text-[11px]">${p.x !== undefined ? `${Math.round(p.x)} ${Math.round(p.y)} ${Math.round(p.z)}` : '0 64 0'}</span></p>
                                        <p class="text-zinc-400">Сытость: <span class="text-amber-400">${p.food !== undefined ? p.food : '20'}🍖</span></p>
                                        <p class="text-zinc-400">Опыт (XP): <span class="text-emerald-400">${p.xp !== undefined ? p.xp : '0'} LVL</span></p>
                                        <p class="text-zinc-400">Режим: <span class="text-indigo-400">${p.gamemode}</span></p>
                                    </div>

                                    <!-- Вывод статов игрока -->
                                    ${statsHtml}

                                    <!-- Селектор режимов -->
                                    <div class="space-y-1">
                                        <p class="text-[10px] text-zinc-500 uppercase font-bold">Изменить режим:</p>
                                        <div class="grid grid-cols-4 gap-1">
                                            <button onclick="quickAction('gamemode creative ${p.name}')" class="bg-zinc-900 border border-zinc-800 text-[10px] py-1 rounded text-zinc-300 hover:bg-zinc-800">Креатив</button>
                                            <button onclick="quickAction('gamemode survival ${p.name}')" class="bg-zinc-900 border border-zinc-800 text-[10px] py-1 rounded text-zinc-300 hover:bg-zinc-800">Выжив.</button>
                                            <button onclick="quickAction('gamemode adventure ${p.name}')" class="bg-zinc-900 border border-zinc-800 text-[10px] py-1 rounded text-zinc-300 hover:bg-zinc-800">Прикл.</button>
                                            <button onclick="quickAction('gamemode spectator ${p.name}')" class="bg-zinc-900 border border-zinc-800 text-[10px] py-1 rounded text-zinc-300 hover:bg-zinc-800">Наблюд.</button>
                                        </div>
                                    </div>

                                    <!-- Отправка ЛС -->
                                    <div class="space-y-1">
                                        <p class="text-[10px] text-zinc-500 uppercase font-bold">Написать лично (ЛС):</p>
                                        <div class="flex gap-1.5">
                                            <input type="text" id="msg-${p.name}" placeholder="Сообщение игроку..." class="w-full bg-zinc-950 border border-zinc-800 rounded px-2.5 py-1 text-xs text-zinc-300 focus:outline-none focus:border-indigo-500">
                                            <button onclick="sendPrivateMsg('${p.name}')" class="bg-indigo-600 text-white px-3 py-1 rounded text-xs font-medium">Отправить</button>
                                        </div>
                                    </div>

                                    <!-- Критические действия -->
                                    <div class="grid grid-cols-3 gap-1.5 pt-1">
                                        <button onclick="quickAction('op ${p.name}')" class="bg-zinc-950 border border-emerald-900/50 text-emerald-400 text-[10px] font-medium py-1.5 rounded hover:bg-emerald-950/20">Выдать OP</button>
                                        <button onclick="quickAction('deop ${p.name}')" class="bg-zinc-950 border border-amber-900/50 text-amber-400 text-[10px] font-medium py-1.5 rounded hover:bg-amber-950/20">Забрать OP</button>
                                        <button onclick="kickPlayerPrompt('${p.name}')" class="bg-red-950/20 border border-red-900/40 text-red-400 text-[10px] font-medium py-1.5 rounded hover:bg-red-900/30">Кикнуть</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (err) {
                console.error("Ошибка обновления данных панели", err);
            }
        }

        // Отправка личного сообщения игроку
        async function sendPrivateMsg(playerName) {
            const input = document.getElementById(`msg-${playerName}`);
            const text = input.value.trim();
            if(!text) return;
            
            // Выполняем классическую серверную команду /msg
            await axios.post(`${API_URL}/api/command`, { command: `msg ${playerName} ${text}` });
            input.value = '';
            tg.HapticFeedback.notificationOccurred('success');
        }

        // Кик с кастомной причиной
        function kickPlayerPrompt(playerName) {
            const reason = prompt(`Укажите причину кика для ${playerName}:`, "Кикнут через администратора");
            if (reason !== null) {
                quickAction(`kick ${playerName} ${reason}`);
            }
        }

        // Логика загрузки Доски почёта с переводом на русский язык
        async function loadLeaderboard() {
            if(!API_URL || !TOKEN) return;
            const tbody = document.getElementById('leaderboard-data');
            try {
                const res = await axios.get(`${API_URL}/api/leaderboard`);
                tbody.innerHTML = '';
                let hasData = false;
                
                if(res.data.stats) {
                    for(let key in res.data.stats) {
                        hasData = true;
                        // Переводим или оставляем оригинал, если ключа нет в словаре
                        const ruName = metricTranslations[key] || key;
                        tbody.innerHTML += `
                            <tr class="hover:bg-zinc-900/20 border-b border-zinc-800/30 transition">
                                <td class="p-3 font-medium text-zinc-400">${ruName}</td>
                                <td class="p-3 text-zinc-200">${res.data.stats[key].player || '—'}</td>
                                <td class="p-3 text-right font-mono text-indigo-400 font-semibold">${res.data.stats[key].value}</td>
                            </tr>
                        `;
                    }
                }
                if(!hasData) {
                    tbody.innerHTML = '<tr><td colspan="3" class="p-4 text-center text-zinc-600 text-xs italic">Данные отсутствуют</td></tr>';
                }
            } catch(err) { tbody.innerHTML = '<tr><td colspan="3" class="p-4 text-center text-red-400 text-xs italic">Ошибка загрузки топов</td></tr>'; }
        }

        async function sendConsoleCommand() {
            const input = document.getElementById('cmd-input');
            const command = input.value.trim();
            if(!command) return;

            try {
                await axios.post(`${API_URL}/api/command`, { command: command });
                input.value = '';
                tg.HapticFeedback.notificationOccurred('success');
                setTimeout(loadData, 300);
            } catch(err) {
                alert("Не удалось отправить команду");
            }
        }

        // Метод отправки объявления на весь сервер (Оригинальный эндпоинт из твоего файла)
        async function sendBroadcast() {
            const input = document.getElementById('bc-input');
            const message = input.value.trim();
            if(!message) return;

            try {
                await axios.post(`${API_URL}/api/broadcast`, { message: message });
                input.value = '';
                tg.HapticFeedback.notificationOccurred('success');
            } catch(err) {
                alert("Ошибка отправки объявления");
            }
        }

        function quickAction(cmd) {
            axios.post(`${API_URL}/api/command`, { command: cmd })
                .then(() => {
                    tg.HapticFeedback.notificationOccurred('success');
                    setTimeout(loadData, 400);
                });
        }

        function askRestart() {
            if(confirm("Вы уверены, что хотите перезапустить сервер прямо сейчас?")) {
                quickAction("restart");
            }
        }

        loadData();
        setInterval(loadData, 4000);
    </script>
</body>
</html>
